---
# Caddy-fronted webtunnel deploy с Let's Encrypt auto-TLS.
#
# Anti-censorship strategy P1 #3 — closes DPI method #15 (FakeTLS
# validation by active probe).  Old `deploy-webtunnel.yml` puts veil
# directly on :443 с а self-signed cert и а one-paragraph decoy;
# this playbook adds Caddy в front so the same :443 endpoint serves а
# real Let's Encrypt cert + а multi-page decoy site, while still
# routing the secret-path WSS upgrade к veil's loopback listener.
#
# Threat surface closed:
#   * Cert chain validates against а public CA (Let's Encrypt) → DPI
#     active probe sees an ordinary HTTPS site, not the self-signed
#     red flag.
#   * Decoy site has multiple pages + plausible content + standard
#     headers — passes "looks like а real small site" heuristics.
#   * Veil's webtunnel listener rebound к 127.0.0.1 (no public
#     port exposed except Caddy's :443).
#
# Prerequisites:
#   * `veil_host` resolves к the host's public IP via DNS
#     (Let's Encrypt's HTTP-01 challenge requires this)
#   * `veil_email` set in inventory (used as ACME contact)
#   * Port 443 reachable от the public internet (HTTP-01 challenge
#     also needs :80 briefly — Caddy listens on :80 automatically
#     для the challenge и redirects к :443)
#   * Host doesn't already have something on :80 / :443
#
# Run:
#   ansible-playbook -i inventory.yml deploy-webtunnel-autotls.yml \
#     --limit b1
#
# Override defaults via --extra-vars:
#   ansible-playbook -i inventory.yml deploy-webtunnel-autotls.yml \
#     --extra-vars 'webtunnel_internal_port=18443 decoy_site_name="Personal Site"' \
#     --limit b2

- name: Deploy Caddy-fronted webtunnel с Let's Encrypt
  hosts: all
  become: true
  serial: 1
  vars:
    # The port on 127.0.0.1 where veil's webtunnel listener will
    # bind.  Caddy reverse-proxies the secret path к this port.  Pick
    # something outside the standard service ranges + clearly
    # internal-only (high port, not :8443 which is а common alt-https
    # that some scanners check).
    webtunnel_internal_port: 18443
    # Where the static decoy site files live on the host.
    webtunnel_decoy_root: /var/lib/veil/webtunnel_decoy
    # ID для the new listen entry — must not collide с existing ids.
    webtunnel_listen_id: "0x00000007"
    # Operator-visible decoy site name.  Override per-host via
    # --extra-vars 'decoy_site_name="My Blog"' для personalized cover.
    decoy_site_name: "Notes &amp; Drafts"
    # The webtunnel secret token — 32 random ascii chars.  Default
    # generated per-host; override only when migrating an existing
    # deployment с а known token.
    webtunnel_secret_path: "/_t/{{ lookup('community.general.random_string', length=32, special=false) | default(lookup('password', '/dev/null length=32 chars=ascii_letters,digits'), true) }}"

  pre_tasks:
    - name: Validate inventory carries veil_host + veil_email
      ansible.builtin.assert:
        that:
          - veil_host is defined and veil_host | length > 0
          - veil_email is defined and veil_email | length > 0
        fail_msg: >-
          Playbook requires `veil_host` (public DNS hostname для
          Let's Encrypt) + `veil_email` (ACME contact).  Set both
          в the host's inventory entry before running.

    - name: Verify DNS resolution of veil_host
      ansible.builtin.shell:
        cmd: |
          getent hosts {{ veil_host }} | awk '{print $1}' | head -1
      register: dns_lookup
      changed_when: false
      failed_when: dns_lookup.stdout | length == 0

    - name: Show DNS-resolved IP
      ansible.builtin.debug:
        msg: "{{ veil_host }} resolves к {{ dns_lookup.stdout }}"

  tasks:
    # ── Caddy install ─────────────────────────────────────────────────
    - name: Install Caddy apt key + repo
      block:
        - name: Ensure curl, gnupg present
          ansible.builtin.apt:
            name:
              - curl
              - gnupg
              - debian-keyring
              - debian-archive-keyring
              - apt-transport-https
            state: present
            update_cache: true

        - name: Fetch Caddy GPG key
          ansible.builtin.shell:
            cmd: |
              curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key | \
                gpg --dearmor -o /etc/apt/keyrings/caddy.gpg
            creates: /etc/apt/keyrings/caddy.gpg

        - name: Add Caddy apt repo
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/caddy.list
            content: "deb [signed-by=/etc/apt/keyrings/caddy.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main\n"
            owner: root
            group: root
            mode: "0644"

        - name: Install Caddy package
          ansible.builtin.apt:
            name: caddy
            state: present
            update_cache: true

    # ── Decoy site staging ────────────────────────────────────────────
    - name: Ensure decoy site directory
      ansible.builtin.file:
        path: "{{ webtunnel_decoy_root }}"
        state: directory
        owner: caddy
        group: caddy
        mode: "0755"

    - name: Render index.html template
      ansible.builtin.template:
        src: decoy-index.html.j2
        dest: "{{ webtunnel_decoy_root }}/index.html"
        owner: caddy
        group: caddy
        mode: "0644"

    - name: Render about.html template
      ansible.builtin.template:
        src: decoy-about.html.j2
        dest: "{{ webtunnel_decoy_root }}/about.html"
        owner: caddy
        group: caddy
        mode: "0644"

    - name: Stage robots.txt
      ansible.builtin.copy:
        dest: "{{ webtunnel_decoy_root }}/robots.txt"
        content: |
          User-agent: *
          Allow: /
          Sitemap: https://{{ veil_host }}/sitemap.xml
        owner: caddy
        group: caddy
        mode: "0644"

    - name: Stage sitemap.xml
      ansible.builtin.copy:
        dest: "{{ webtunnel_decoy_root }}/sitemap.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>https://{{ veil_host }}/</loc><changefreq>weekly</changefreq></url>
            <url><loc>https://{{ veil_host }}/about.html</loc><changefreq>monthly</changefreq></url>
          </urlset>
        owner: caddy
        group: caddy
        mode: "0644"

    # ── Caddy config ──────────────────────────────────────────────────
    - name: Ensure /var/log/caddy/
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: "0755"

    - name: Render Caddyfile
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: caddy
        mode: "0640"
      notify: Reload Caddy

    - name: Validate Caddyfile syntax
      ansible.builtin.shell:
        cmd: caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      register: caddy_validate
      changed_when: false
      failed_when: caddy_validate.rc != 0

    - name: Show Caddy validate output
      ansible.builtin.debug:
        var: caddy_validate.stdout_lines

    # ── veil node.toml: webtunnel listener на 127.0.0.1 ────────────
    # Replace any existing webtunnel-wss entry с а loopback-bound one;
    # add if missing.  Reusing `webtunnel_listen_id` so re-runs are
    # idempotent.
    - name: Stage Python helper for atomic listen-block edit
      ansible.builtin.copy:
        dest: /tmp/_veil_webtunnel_loopback.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import re, sys
          path = "/var/lib/veil/node.toml"
          listen_id = sys.argv[1]
          port = sys.argv[2]
          secret = sys.argv[3]
          host = sys.argv[4]
          with open(path) as f:
              src = f.read()
          # New entry: bind на 127.0.0.1, advertise the public host
          # (Caddy fronts so the advertise URI is the public hostname).
          new_entry = (
              '{ id = "' + listen_id + '", '
              'transport = "webtunnel-wss://127.0.0.1:' + port + '", '
              'advertise = "webtunnel-wss://' + host + ':443" }'
          )
          # Strip any existing entry с matching id OR any non-loopback
          # webtunnel-wss entry (legacy `deploy-webtunnel.yml` artifact).
          patterns_to_strip = [
              r',\s*\{\s*id\s*=\s*"' + re.escape(listen_id) + r'"[^}]*\}',
              r',\s*\{\s*[^}]*transport\s*=\s*"webtunnel-wss://0\.0\.0\.0:[^"]+"[^}]*\}',
          ]
          for pat in patterns_to_strip:
              src = re.sub(pat, '', src, flags=re.DOTALL)
          # Append the new entry before the closing `]` of the
          # top-level listen array.
          m = re.search(r'((?:^|\n)listen\s*=\s*\[.*?)(\n\])', src, re.DOTALL)
          if not m:
              sys.exit("ERROR: could not find top-level listen = [...] block")
          new_src = src[:m.start(2)] + ',\n  ' + new_entry + src[m.start(2):]
          # Update secret-path в [transport] section (or insert if missing).
          if re.search(r'^webtunnel_secret_path\s*=', new_src, re.MULTILINE):
              new_src = re.sub(
                  r'^webtunnel_secret_path\s*=.*$',
                  'webtunnel_secret_path = "' + secret + '"',
                  new_src, count=1, flags=re.MULTILINE,
              )
          else:
              if '[transport]' not in new_src:
                  new_src += '\n[transport]\n'
              new_src = re.sub(
                  r'(\[transport\][^\[]*)',
                  r'\1webtunnel_secret_path = "' + secret + '"\n',
                  new_src, count=1,
              )
          with open(path, "w") as f:
              f.write(new_src)
          print("ok")

    - name: Apply webtunnel loopback config к node.toml
      ansible.builtin.shell:
        cmd: |
          python3 /tmp/_veil_webtunnel_loopback.py \
            "{{ webtunnel_listen_id }}" \
            "{{ webtunnel_internal_port }}" \
            "{{ webtunnel_secret_path }}" \
            "{{ veil_host }}"
        executable: /bin/bash
      register: toml_edit
      changed_when: "'ok' in toml_edit.stdout"

    - name: Cleanup staged script
      ansible.builtin.file:
        path: /tmp/_veil_webtunnel_loopback.py
        state: absent

    - name: Validate node.toml after edit
      ansible.builtin.shell:
        cmd: |
          su -s /bin/sh veil -c \
            '/usr/local/bin/veil-cli --config /var/lib/veil/node.toml config validate'
      register: veil_validate
      changed_when: false
      failed_when: veil_validate.rc != 0

    # ── Service restart + readiness probes ────────────────────────────
    - name: Restart veil (pick up new listen entry)
      ansible.builtin.systemd:
        name: veil.service
        state: restarted

    - name: Wait для veil metrics endpoint
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 60); do
            if curl -sS --max-time 1 http://127.0.0.1:{{ metrics_port }}/metrics > /dev/null 2>&1; then
              echo "veil metrics up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "veil down after 60s"
          exit 1
      register: veil_wait
      changed_when: false

    - name: Show veil readiness
      ansible.builtin.debug:
        var: veil_wait.stdout

    - name: Start Caddy (will provision Let's Encrypt cert on first start)
      ansible.builtin.systemd:
        name: caddy
        state: restarted
        enabled: true

    - name: Wait для Caddy к obtain Let's Encrypt cert + start serving
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 120); do
            if curl -fsS --max-time 3 -o /dev/null \
                 https://{{ veil_host }}/about.html 2>/dev/null; then
              echo "caddy up + cert valid after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "caddy not responding after 120s — check journalctl -u caddy"
          exit 1
      register: caddy_wait
      changed_when: false
      delegate_to: localhost
      become: false
      failed_when: caddy_wait.rc != 0

    - name: Show Caddy readiness
      ansible.builtin.debug:
        var: caddy_wait.stdout

    # ── Post-deploy verification ──────────────────────────────────────
    - name: Verify decoy site serves with expected content
      ansible.builtin.shell:
        cmd: |
          curl -fsS --max-time 5 https://{{ veil_host }}/ | \
            grep -c "{{ decoy_site_name | regex_replace('&amp;', '&') }}"
      register: decoy_check
      changed_when: false
      failed_when: decoy_check.stdout | int < 1
      delegate_to: localhost
      become: false

    - name: Verify secret-path proxies к veil (404 from veil, NOT Caddy's file_server 404)
      ansible.builtin.shell:
        cmd: |
          # GET к secret path returns either а WSS upgrade rejection
          # (veil's webtunnel server demands the upgrade) or 400
          # bad-request — both confirm veil is on the other side.
          # The key signal: status NOT 404, which would mean Caddy's
          # file_server caught the request.
          status=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 5 \
                    https://{{ veil_host }}{{ webtunnel_secret_path }} || echo "fail")
          echo "secret-path status: $status"
          [ "$status" != "404" ] && [ "$status" != "fail" ]
      register: secret_check
      changed_when: false
      delegate_to: localhost
      become: false

    - name: Confirm veil webtunnel bound на loopback only
      ansible.builtin.shell:
        cmd: |
          ss -tlnp 'sport = :{{ webtunnel_internal_port }}' | \
            grep -E "127\.0\.0\.1:{{ webtunnel_internal_port }}|\\[::1\\]:{{ webtunnel_internal_port }}" | \
            head -1
      register: loopback_check
      changed_when: false
      failed_when: loopback_check.stdout | length == 0

    - name: Final status
      ansible.builtin.debug:
        msg: |
          ✅ Webtunnel + Let's Encrypt deployed on {{ inventory_hostname }}.
          Public:  https://{{ veil_host }}/         (decoy site)
          Secret:  https://{{ veil_host }}{{ webtunnel_secret_path }}  (veil endpoint)
          Listen:  127.0.0.1:{{ webtunnel_internal_port }}   (veil, loopback-only)
          Caddy:   :443 (Let's Encrypt cert auto-renews)

          To rotate secret_path: re-run с the same playbook (а new
          path is generated automatically); update client invites.

  handlers:
    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
