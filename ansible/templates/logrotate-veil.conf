# Rotation policy for veil testnet logs.
#
# Deployed to /etc/logrotate.d/veil.  Triggered by the daily logrotate
# systemd timer (/lib/systemd/system/logrotate.timer).
#
# Why copytruncate: veil.service uses `StandardOutput=append:<path>`,
# which opens the file ONCE на старте and writes via the kept fd.  The
# canonical rotate-via-rename approach would leave the daemon writing к
# `veil.log.1` while logrotate creates а fresh `veil.log`, silently
# losing every line until restart.  `copytruncate` instead copies the
# file, then truncates the original in place — preserves the fd, no
# restart needed, no log loss beyond the (sub-millisecond) copy window.
#
# Size cap chosen by working backwards from disk pressure: VPS has 8.7G
# root, 8 hosts, ~3.5G typical baseline (system + veil state).  Cap
# the rotated set at 600M (200M × 3 generations) — leaves 4G+ headroom
# even on the fullest host.

/var/log/veil/veil.log
/var/log/veil/chat-node.log {
    size 200M
    rotate 3
    copytruncate
    compress
    delaycompress
    missingok
    notifempty
}

# chaos-ban.log stays unrotated — tiny по volume (28 KB after а day),
# и preserving it intact lets us reconstruct ban-cycle timelines without
# stitching .gz fragments.
