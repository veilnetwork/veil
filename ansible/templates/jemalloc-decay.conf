[Service]
# jemalloc aggressive decay — return dirty pages к OS within 1s после free
# instead of holding for default ~10s arena decay.  Mitigates RSS bloat
# observed under chat-node bursts where 200 msg/sec × 60 KB IPC frame
# allocations create ~24 MB/sec malloc churn; default decay holds
# 100-200 MB dirty pages even after frames freed, manifesting as RSS
# plateaus 300-560 MB on data-plane originator nodes.
#
# narenas:2     — 2 arenas instead of CPU-count (less fragmentation между
#                 arenas; 1-2 producer threads worth of allocator parallelism
#                 is plenty for а tokio runtime).
# dirty_decay_ms — 10s default → 1s; pages returned via MADV_FREE faster.
# muzzy_decay_ms — same для muzzy (post-MADV_FREE, OS-reclaimed) pages.
#
# Trade-off: extra page-fault traffic on next alloc (~1 μs per page);
# at 200 msg/sec @ 64 KB this is 200 × 16 = 3200 page-faults/sec ≈ 3.2 ms
# CPU/sec = 0.3% overhead.  Acceptable.
#
# To revert: delete this drop-in file и `systemctl daemon-reload` +
# restart veil.
#
# IMPORTANT (Phase 6.50.d.5n, 2026-05-14): tikv-jemallocator builds
# jemalloc with the `_rjem_` prefix, so jemalloc reads its config from
# `_RJEM_MALLOC_CONF`, NOT vanilla `MALLOC_CONF`.  This was broken since
# the original config drop-in — daemon ran с jemalloc DEFAULTS
# (opt.dirty_decay_ms=10000) for weeks until verified via
# `_RJEM_MALLOC_CONF=stats_print:true /usr/local/bin/veil-cli --version`.
# Caught accidentally while setting up heap profiling in cron #15.
Environment="_RJEM_MALLOC_CONF=narenas:2,dirty_decay_ms:1000,muzzy_decay_ms:1000"
