[package]
name = "veil-vpn-helper"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Privileged same-binary Windows packet-tunnel helper for xVeil"

[lib]
crate-type = ["cdylib", "rlib"]
name = "veil_vpn_helper"

[dependencies]
ipnet = { version = "2", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(windows)'.dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }
tun = { version = "=0.8.13", features = ["async", "verify_binary_signature"] }
tun2proxy = { version = "=0.8.2", default-features = false }
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_NetworkManagement_IpHelper",
    "Win32_NetworkManagement_Ndis",
    "Win32_Networking_WinSock",
    "Win32_Security",
    "Win32_System_Threading",
] }

[lints]
workspace = true
