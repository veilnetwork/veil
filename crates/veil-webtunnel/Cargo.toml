[package]
name = "veil-webtunnel"
version = "0.1.0"
edition = "2024"
description = "webtunnel-style anti-probe endpoint masking for WSS/TLS transports. Phase 5 of PLAN_TRANSPORT_OBFUSCATION.md — disguises the endpoint as a legitimate HTTPS site; switches to WebSocket veil-tunnel mode only with the configured secret path + auth header."
license = "AGPL-3.0-or-later"

[dependencies]
async-trait = "0.1"
base64 = "0.22"
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["client", "http1"] }
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }
rand = "0.9"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "net", "rt"] }
tokio-tungstenite = "0.24"

[dev-dependencies]
futures-util = "0.3"
tokio = { version = "1", features = ["fs", "io-util", "macros", "rt", "rt-multi-thread"] }
