[package]
name = "veil-onion-stream"
version = "0.1.0"
edition = "2024"
description = "Reliable, congestion-controlled byte-stream over an anonymous onion circuit's lossy fixed-size cell channel (end-to-end ARQ + AIMD CC + clean EOF/RST for resumable transfers). Sans-IO core: deterministic, transport-agnostic."
license = "AGPL-3.0-or-later"

[dependencies]
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }

[dev-dependencies]
# `test-util` enables paused/auto-advancing virtual time so async tests run the
# RTO/retransmit timeline instantly + deterministically.
tokio = { version = "1", features = ["test-util", "rt", "macros", "time", "sync"] }

[lints]
workspace = true
