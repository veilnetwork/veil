[package]
name = "veil-mesh"
version = "0.1.1"
edition = "2024"
description = "Veil network local-LAN mesh layer: realm-scoped UDP broadcast (Epic 406), beacon discovery, neighbor table, gateway-bridge for cross-realm traffic. Phase 4 extraction from veilcore."
license = "AGPL-3.0-or-later"

[dependencies]
veil-crypto = { path = "../veil-crypto" }
veil-error = { path = "../veil-error" }
veil-proto = { path = "../veil-proto" }
veil-udp-obfs = { path = "../veil-udp-obfs" }
veil-types = { path = "../veil-types" }
veil-util = { path = "../veil-util" }

base64 = "0.22"
blake3 = "1.5"
log = "0.4"
rand = "0.9"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.42", features = ["net", "sync", "rt", "time", "macros"] }

[lints]
workspace = true
