[package]
name = "veilclient-ffi"
version = "0.4.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "C-FFI surface around veilclient — driver for non-Rust hosts (Flutter, Swift, Kotlin)"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]
name       = "veilclient_ffi"

[features]
# `tls-boring` ON by default — the mobile lib carries the browser-like TLS
# ClientHello + rotation backend (censorship-resistance baseline for the
# mobile-apps stage). The android (`cargo ndk`) and iOS (xcframework) builds
# inherit it via default features; BoringSSL cross-compiles to both
# (aarch64-linux-android ELF + aarch64-apple-ios Mach-O, verified). Needs
# `cmake` + a C toolchain at build time.
#
# Note: today the FFI surface is an IPC client (`veil_connect` to a daemon
# socket), so the fingerprint is presented by whatever runs the node; the
# default keeps the backend present and proven-buildable, ready for the
# mobile-apps stage that wires an on-device node. Opt out (pure-Rust / no
# cmake, ~1.2 MB smaller .so) with `--no-default-features`.
default = ["tls-boring"]
tls-boring = ["veilclient/tls-boring"]
# Forward `veilclient` feature toggles for downstream
# (Flutter plugin, mobile build script) opt-in.
allow-empty-seeds = ["veilclient/allow-empty-seeds"]
production-seeds  = ["veilclient/production-seeds"]
test-low-difficulty = ["veilclient/test-low-difficulty"]

# Embed a full veil node IN-PROCESS (no `veil-cli` subprocess) — for sandboxed
# desktop + mobile (iOS) hosts that cannot spawn a child process. Pulls
# veil-node-runtime with NO default features (in-memory DHT) to keep the heavy
# C++ RocksDB cold store off mobile. Add `node-embedded-rocksdb` for a
# persistent DHT on desktop/server.
node-embedded = ["dep:veil-node-runtime", "dep:veil-cfg"]
node-embedded-rocksdb = ["node-embedded", "veil-node-runtime/rocksdb-cold"]

[dependencies]
veilclient = { path = "../../veilclient" }
veil-onion-stream = { path = "../veil-onion-stream" }
veil-app = { path = "../veil-app" }
veil-identity = { path = "../veil-identity" }
veil-types = { path = "../veil-types" }
# Embedded node runtime — optional, NO default features (see `node-embedded`).
veil-node-runtime = { path = "../veil-node-runtime", default-features = false, optional = true }
veil-cfg = { path = "../veil-cfg", optional = true }
# Audit L-15: wrap the in-flight password copy in `Zeroizing` so the
# `_zeroize_with_password` restore path scrubs every copy on drop.
zeroize = "1"
# Push-envelope sealing primitive (Epic 489.10) — exposed as a
# stateless FFI helper so apps can seal FCM/APNs tokens locally
# before calling `veil_set_push_envelope`.  Pulled directly to
# avoid a round-trip through veilclient (sealing is pure crypto;
# no daemon RPC needed).
veil-anonymity = { path = "../veil-anonymity" }
# Wake-HMAC primitive (slice 4.3.3) — same rationale: pure crypto,
# avoid a round-trip through veilclient.  Used for the FFI verify
# entry-point and the random-key generator that receivers persist
# platform-side.
veil-crypto = { path = "../veil-crypto" }
# XChaCha20-Poly1305 for veil_seal/veil_unseal — encrypts large file blobs stored
# OUTSIDE the deniable container (key derived from the unlocked container).
chacha20poly1305 = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "io-util"] }
libc = "0.2"

# Android: route the embedded node's `log` output to logcat so the in-process
# node is debuggable on-device (Rust stderr is NOT captured by logcat).
[target.'cfg(target_os = "android")'.dependencies]
android_logger = "0.13"
log = "0.4"

[dev-dependencies]
tempfile = "3"
veil-proto = { path = "../veil-proto" }

[lints]
workspace = true
