[package]
name = "veil-update"
version = "0.2.0"
edition = "2024"
description = "Veil network self-update: signed manifest fetch (multi-CDN failover), HTTPS bridge to veil-bootstrap, atomic binary swap, periodic check task. Phase 6 extraction from veilcore (Epic 484.3)."
license = "AGPL-3.0-or-later"

[features]
tls-boring = ["veil-bootstrap/tls-boring", "veil-transport/tls-boring"]

[dependencies]
veil-bootstrap = { path = "../veil-bootstrap" }
veil-crypto = { path = "../veil-crypto" }
veil-error = { path = "../veil-error" }
veil-transport = { path = "../veil-transport" }
veil-types = { path = "../veil-types" }
veil-util = { path = "../veil-util" }

base64 = "0.22"
blake3 = "1.5"
log = "0.4"
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
subtle = "2"
thiserror = "2.0"
tokio = { version = "1.42", features = ["fs", "io-util", "rt", "time", "macros"] }

[lints]
workspace = true
