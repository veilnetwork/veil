[package]
name = "veil-session-integration-tests"
version = "0.3.0"
edition = "2024"
description = "Integration tests for `veil-session`'s runner state machine.  Extracted from veilcore in audit batch 2026-05-21 Phase D14 — large 5568-LoC test file that previously coupled veilcore-private modules now compiles against the published surface of veil-session + sibling crates."
license = "AGPL-3.0-or-later"
publish = false

# This crate intentionally has no production library — it exists purely
# as a home for integration tests against the published veil-session
# surface.  `cargo test -p veil-session-integration-tests` runs the
# entire suite; building veilcore itself becomes ~5 KLoC faster.
[lib]
path = "src/lib.rs"

[features]
default = []
# Mirror the test-low-difficulty PoW knob used by veil-session during
# unit-testing.  Enabled in this crate's dev-dependencies block below
# (the `[features]` table is for downstream `--features` opt-in
# consistency, not actually required since these are tests-only).
test-low-difficulty = [
    "veil-crypto/test-low-difficulty",
    "veil-dht/test-low-difficulty",
    "veil-proto/test-low-difficulty",
]

[dependencies]
veil-bufpool = { path = "../veil-bufpool" }
veil-cfg = { path = "../veil-cfg" }
veil-dispatcher = { path = "../veil-dispatcher" }
veil-e2e = { path = "../veil-e2e" }
veil-node-runtime = { path = "../veil-node-runtime" }
veil-observability = { path = "../veil-observability" }
veil-proto = { path = "../veil-proto" }
veil-session = { path = "../veil-session" }
veil-transport = { path = "../veil-transport" }
veil-types = { path = "../veil-types" }
veil-util = { path = "../veil-util" }

[dev-dependencies]
base64 = "0.22"
blake3 = "1"
ed25519-dalek = "2"
tokio = { version = "1.42", features = ["full", "test-util"] }
# Same PoW knob mirror as veilcore [dev-dependencies]: feature is forwarded
# for test runs so that quality session tests inherit the 16-bit PoW
# difficulty used inside veil-session's own unit-tests.
veil-crypto = { path = "../veil-crypto", features = ["test-low-difficulty"] }
veil-dht    = { path = "../veil-dht",    features = ["test-low-difficulty"] }
veil-proto  = { path = "../veil-proto",  features = ["test-low-difficulty"] }
