[package]
name = "veil-mailbox"
version = "0.1.1"
edition = "2024"
description = "Relay-side store-and-forward mailbox for offline message delivery. Phase 6.49 T1.4 P1, Epic 489.10."
license = "AGPL-3.0-or-later"

[dependencies]
veil-bloom = { path = "../veil-bloom" }

# Phase 6.50.b #316 slice 1: capability tokens — receiver-signed cookies
# that gate sender access to the mailbox PUT endpoint.  blake3 binds the
# token to a `node_id` (BLAKE3 of issuer pubkey); ed25519-dalek and
# pqcrypto-falcon verify the signature.  Verify-only code path in this
# crate (~50 LoC); avoids a fat edge to veil-identity for what is
# functionally a small standalone primitive.
blake3 = "1.5"
ed25519-dalek = { version = "2", features = ["std"] }
pqcrypto-falcon = "0.4"
pqcrypto-traits = "0.3"
redb = "2"
thiserror = "2.0"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
