name: Verify installer signing key

# Manual, on-demand check that the RELEASE_INSTALLER_ED25519_SK CI secret is
# readable by workflows AND that its PUBLIC half matches the key pinned in
# scripts/install.sh (pinned_release_pubkey). Run this after provisioning or
# rotating the installer signing key and BEFORE cutting a release — it is the
# cheap pre-flight for the same assertion release.yml enforces at sign time.
#
# Safety: prints only PUBLIC key material. The private key is never echoed;
# GitHub Actions additionally masks the registered secret in logs.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      RELEASE_INSTALLER_ED25519_SK: ${{ secrets.RELEASE_INSTALLER_ED25519_SK }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Secret visible + public half matches pinned installer key
        run: |
          set -eu
          if [ -z "${RELEASE_INSTALLER_ED25519_SK:-}" ]; then
            echo "::error::secret RELEASE_INSTALLER_ED25519_SK is empty or not readable by this workflow"
            exit 1
          fi
          echo "secret is present and non-empty (value masked by Actions)"
          echo "openssl: $(openssl version)"

          keyfile="$(mktemp)"; pubfile="$(mktemp)"
          printf '%s' "$RELEASE_INSTALLER_ED25519_SK" > "$keyfile"
          if ! openssl pkey -in "$keyfile" -pubout -out "$pubfile" 2>/dev/null; then
            echo "::error::secret is not a valid Ed25519 private key (openssl pkey failed)"
            exit 1
          fi
          echo "--- derived PUBLIC key (safe to print) ---"
          cat "$pubfile"

          # Round-trip: the secret can actually sign, and the signature verifies
          # under its own public half.
          printf 'f2-secret-check' > msg
          openssl pkeyutl -sign -inkey "$keyfile" -rawin -in msg -out msg.sig
          if openssl pkeyutl -verify -pubin -inkey "$pubfile" -rawin -in msg -sigfile msg.sig >/dev/null 2>&1; then
            echo "round-trip OK: secret is a usable Ed25519 signing key"
          else
            echo "::error::sign/verify round-trip failed"
            exit 1
          fi

          # The decisive check: derived public half == pinned_release_pubkey().
          pinned="$(sed -n '/-----BEGIN PUBLIC KEY-----/,/-----END PUBLIC KEY-----/p' scripts/install.sh | tr -d '[:space:]')"
          derived="$(tr -d '[:space:]' < "$pubfile")"
          rm -f "$keyfile" "$pubfile" msg msg.sig
          if [ -z "$pinned" ]; then
            echo "::error::no pinned public key in scripts/install.sh (pinned_release_pubkey is empty)"
            exit 1
          fi
          if [ "$pinned" = "$derived" ]; then
            echo "MATCH: CI secret public half == pinned_release_pubkey() in install.sh — releases will verify."
          else
            echo "::error::MISMATCH: the CI secret does NOT match the pinned installer key"
            exit 1
          fi
