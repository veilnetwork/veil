name: CI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Audit batch 2026-05-27 Phase Q.6: reverted к tag-only triggering
# after PR/branch-push runs exhausted the org's GitHub Actions
# minutes budget.  Hygiene (clippy `-D warnings`, mutex-poison policy,
# dead-code-anchor policy) is enforced locally and revalidated на release;
# the cost of one regression slipping past а push is а pre-release
# `gh workflow run ci.yml` (or just bump the tag if а fix is needed).
#
# History: Phase E19 (2026-05-21) added PR + branch triggers because
# tag-only CI had let 4 mutex + 3 dead-code + 7 cfg-warning violations
# slip в.  Phase Q.6 (2026-05-27) is the budget-driven rollback —
# tradeoff is conscious, не accidental.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  hygiene:
    # Phase 6.50.b-followup: fmt + clippy lint gate.  Runs before `test`
    # so PRs that fail style/lint don't burn full-build CI time.  Both
    # checks ара fast (<2 min combined on cached cargo).
    name: Hygiene (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (warnings deny)
        # Phase 6.50.b-followup: -D warnings gate locks в the clippy
        # cleanup batch.  New lints must be fixed OR explicitly
        # `#[allow(…)]`-d с а rationale comment before merge.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check (cfg-warnings deny)
        # Audit batch 2026-05-21 Phase E19: catch `unexpected_cfgs`
        # warnings (e.g. references к features quя have not been
        # declared в this crate's Cargo.toml — Phase 4 extraction
        # surfaced 7 such sites в veil-node-runtime).  Clippy alone
        # doesn't fire on these; а dedicated `cargo check` pass с
        # RUSTFLAGS=-D warnings catches them at compile-front-end.
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo check --workspace --all-targets

      - name: Install cbindgen
        run: cargo install cbindgen --version "^0.29" --locked

      - name: FFI header is up-to-date (cbindgen)
        # Phase 6.50.b-followup: regenerate `veil_ffi.h` от Rust source
        # и diff against committed copy.  Closes the "header drifts от
        # lib.rs" bug class (e.g. NetworkKind.unknown = 4 vs 255 Dart
        # binding mismatch that survived only because the header was
        # hand-maintained и nobody noticed missing exports).  PRs that
        # touch FFI signatures must regenerate (`./scripts/regen-ffi-header.sh`)
        # и commit the updated header.
        run: |
          ./scripts/regen-ffi-header.sh
          git diff --exit-code crates/veilclient-ffi/include/veil_ffi.h

      - name: Mutex poison-recovery policy
        # Phase 6.50.b-followup: enforce that production code uses the
        # `lock!()`/`rlock!()`/`wlock!()` macros for Mutex/RwLock
        # acquisitions instead of raw `.lock().unwrap()` / `.lock().expect()`.
        # Macros recover от poison; raw `.unwrap()` aborts the holder task
        # silently (or, at the FFI boundary, is UB).
        run: ./scripts/check-mutex-poison-policy.sh

      - name: #[allow(dead_code)] anchor policy
        # Phase 6.50.b: every `#[allow(dead_code)]` attribute must have
        # an explanation (doc-comment OR adjacent `#[cfg(...)]`).  See
        # script docstring для full policy.
        run: ./scripts/check-allow-dead-code-anchors.sh

      - name: Install cargo-audit
        # Phase 6.50.b audit-A2: `cargo audit` gates against the RustSec
        # advisory DB на каждом push к main.  Pinned minor (^0.22) для
        # воспроизводимости — minor bumps OK (new advisories only).
        #
        # Phase Q.2 bump: 0.21 не парсит CVSS 4.0 vector strings
        # (`CVSS:4.0/...`) которые RustSec начал использовать с
        # RUSTSEC-2026-0076 (libcrux-ml-dsa).  0.22 series adds CVSS 4.0
        # support через transitive `rustsec` ≥ 0.30.  Без bump CI fails
        # на parse error даже когда advisory нас не касается.
        run: cargo install cargo-audit --version "^0.22" --locked

      - name: cargo audit (RustSec advisory DB)
        # Phase 6.50.b audit-A2: fail the CI if any known CVE lands в the
        # transitive graph.  Allow-list is currently empty — the prior
        # `RUSTSEC-2025-0134` ignore was retired after `rustls-pemfile`
        # was migrated к `rustls-pki-types::pem::PemObject` (Phase
        # 6.50.b followup).  Add new ignores ONLY со ссылкой на а
        # tracking issue/Epic.
        run: cargo audit --deny warnings

  test:
    name: Test
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        # Phase Q.6 CI fix: GH Actions ubuntu-latest images pre-install
        # ~30 GB of toolchains we don't need (Android SDK / NDK, .NET, GHC,
        # CodeQL, Boost, prebuilt docker images).  Combined с our cached
        # target/ (5-10 GB after debug build) the runner's 14 GB free disk
        # exhausted и worker died с "No space left on device" while writing
        # its own _diag log.  Remove what we don't use before checkout.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        # Phase Q.4 CI fix: GH Actions ubuntu-latest runners (7 GB RAM,
        # 14 GB SSD) cannot link our largest test binaries (veil-app,
        # veil-ipc, chat_client) under default lld — lld holds the
        # full debug-info graph в memory и SIGBUS'es when mmap returns
        # ENOMEM/EBUSY. `mold` is а drop-in replacement that uses parallel
        # mmap'd output + dramatically smaller intermediate state — same
        # workspace links comfortably under 2 GB peak RSS where lld peaks
        # past 4 GB.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mold

      - name: Install cargo-nextest
        # Phase Q.5 CI fix: cargo-nextest replaces `cargo test` для lib/bins/
        # tests passes — better process model (each test runs в its own
        # process, не linker-bound batch), tighter parallelism control,
        # 1.5-3x wall-clock speedup на our suite.  Doctests stay on
        # `cargo test --doc` (nextest doesn't support doctests).  Pulled
        # as а prebuilt binary so this step adds <2 seconds.
        run: |
          curl -LsSf https://get.nexte.st/latest/linux \
            | tar zxf - -C "${HOME}/.cargo/bin"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        # Phase Q.4: route linker through mold для all rustc invocations
        # in this job (build, test, doctest).  `-C link-arg=-fuse-ld=mold`
        # passes the flag к the system cc driver which then picks mold.
        #
        # Phase Q.5: build с `test-low-difficulty,allow-empty-seeds` so
        # the test run reuses these artifacts instead of doing а second
        # incremental rebuild с different features (would invalidate
        # most of the dependency graph).
        env:
          RUSTFLAGS: '-C link-arg=-fuse-ld=mold'
        run: cargo build --workspace --features veilcore/test-low-difficulty,veilcore/allow-empty-seeds

      - name: Run unit tests (nextest)
        # Phase Q.5 CI fix: cargo-nextest run lib + bins + tests в parallel
        # processes — 1.5-3x faster than `cargo test` для our suite (~600
        # individual tests across 60+ crates) because the per-test process
        # boundary saves linker memory и lets nextest schedule в priority
        # order (long-tail tests start first).  Test-threads limit kept at
        # 2 — PoW-based sim tests starve each other on shared cores.
        #
        # `test-low-difficulty,allow-empty-seeds` features lower the PoW
        # threshold (24-bit → 16-bit) so identity / DHT / sim tests don't
        # spend minutes searching nonces.
        #
        # Phase Q.4 retained: CARGO_PROFILE_DEV_DEBUG=1 cuts embedded debug
        # info, mold linker keeps RSS under the runner's cap.
        env:
          CARGO_PROFILE_DEV_DEBUG: '1'
          RUSTFLAGS: '-C link-arg=-fuse-ld=mold'
        run: |
          cargo nextest run \
            --workspace \
            --features veilcore/test-low-difficulty,veilcore/allow-empty-seeds \
            --lib --bins --tests \
            --test-threads=2

      - name: Run doctests
        # nextest doesn't support doctests (rustc compiles them one-at-a-
        # time через rustdoc — separate from the test-runner pipeline), so
        # the doctest pass stays on stock cargo test.
        env:
          CARGO_PROFILE_DEV_DEBUG: '1'
          RUSTFLAGS: '-C link-arg=-fuse-ld=mold'
        run: |
          cargo test \
            --workspace \
            --features veilcore/test-low-difficulty,veilcore/allow-empty-seeds \
            --doc \
            -- --test-threads=2

  windows-check:
    name: Windows cross-compile check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        # g++ is required by the RocksDB C++ source used behind the
        # default `rocksdb-cold` feature; gcc alone is not enough.
        # `mingw-w64-tools` ships the additional dev headers (assert.h,
        # stdint.h, etc.) that the `ring-0.17` build script demands when
        # rebuilding curve25519/p256 C sources on cross-compile.
        # `nasm` is required by ring's SHA-x86_64 assembly path —
        # без it ring's build.rs falls through to a slower pure-Rust
        # impl on some configurations и emits warnings, but on Windows-GNU
        # it can hard-fail the link step.
        #
        # **Threading-model:** Ubuntu's `g++-mingw-w64-x86-64` meta-package
        # defaults к the **win32** thread variant, which lacks
        # `__gthread_cond_*` symbols that RocksDB's C++ headers reference
        # через `std::condition_variable`.  Install the **posix** variants
        # explicitly и switch update-alternatives к point at them, so
        # `clang++ --target=x86_64-pc-windows-gnu` picks up the right
        # gthr-default.h.
        run: |
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix \
            mingw-w64-tools nasm
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Windows compilation
        # veil-cli, ogate, oproxy and veilclient-ffi now default to
        # `tls-boring`, which links a cmake-built BoringSSL (`btls-sys`).
        # Cross-compiling BoringSSL to `x86_64-pc-windows-gnu` from a Linux
        # runner is not a supported configuration (and none of these are
        # shipped as windows-gnu artifacts — the real Windows path is the
        # `windows-test` job's native MSVC `-p veilcore --no-default-features`
        # build; veilclient-ffi ships to android/iOS, not windows-gnu).
        # Excluding the tls-boring-default crates keeps this a pure-Rust
        # cross-compile check of the rest of the workspace (they are the only
        # crates with tls-boring in their default set, so excluding them
        # disables BoringSSL here; their libs are still checked transitively).
        run: cargo check --target x86_64-pc-windows-gnu --workspace --exclude veil-cli --exclude ogate --exclude oproxy --exclude veilclient-ffi

  windows-test:
    # Epic 451.10: native Windows build + targeted tests for the TCP admin
    # backend (Epic 451.7).  Runs on a real Windows runner so that:
    #   - Unix-gated helpers that the Linux build skips (e.g. `libc::umask`)
    #     are verified to remain correctly excluded.
    #   - The TCP admin backend round-trips end-to-end on NT.
    # Runs as a separate job rather than a matrix entry so that a Windows-only
    # failure doesn't mask Linux regressions.
    name: Windows native build + TCP admin tests
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # `pqcrypto-internals` (ML-KEM dep) emits MSVC-style `/arch:AVX2`
      # when target = `*-windows-msvc`.  The runner's plain `clang`
      # (GNU-mode) на PATH gets auto-detected by cc-rs but doesn't
      # understand `/arch:` — build fails с "no such file or directory:
      # '/arch:AVX2'".  Pin к `clang-cl` (MSVC-compatible driver, ships
      # с LLVM on windows-latest), which speaks the same flag dialect.
      - name: Build (no default features — skip RocksDB)
        env:
          CC: clang-cl
          CXX: clang-cl
        # `rocksdb-cold` requires MSVC + a full C++ build toolchain; the core
        # veil code compiles cleanly without it.  Leaves the Windows
        # server deployment path using the in-memory DHT (fine for the
        # admin-protocol validation this job is concerned with).
        run: cargo build -p veilcore --lib --no-default-features

      - name: Run TCP admin integration tests
        env:
          CC: clang-cl
          CXX: clang-cl
        # The admin_tcp_* tests are #[ignore]-marked by default because their
        # parallel flakiness on Linux hides real Windows regressions; running
        # them explicitly here is their reason to exist.
        run: cargo test -p veilcore --lib --no-default-features node::admin::tests::admin_tcp -- --ignored --test-threads=1

      - name: Run token_file helpers
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cargo test -p veilcore --lib --no-default-features node::admin_transport::tests -- --test-threads=1

  bench:
    name: Benchmark regression guard
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks (regression check)
        # Run briefly (--sample-size 10) just to verify no panics or
        # gross regressions.  For full statistical analysis, use
        # `cargo bench` locally.  Each bench target is enumerated
        # explicitly so that `--sample-size 10` is never passed to a
        # libtest harness (which rejects unknown flags).
        #
        # Bench list mirrors `veilcore/Cargo.toml [[bench]]` for
        # the targets that are LIGHT enough to run на free CI minutes
        # (sample-size=10 keeps each bench под ~30 s).  Heavy
        # benches (`session_scale`, `dht_store_throughput`,
        # `recursive_relay_chain`) are tested locally only — they
        # spin up sim networks и take 1-2 min each.
        #
        # Phase 6.51: stale `mailbox_throughput` removed (deleted in
        # crate-split phase 4 — `241b72e`); `hybrid_kex` (Epic 486.1)
        # и `adversary_validation` (Epic 485.4) added к guard recent
        # cryptographic primitives и operator-capacity-planning
        # numbers respectively.
        #
        # `--features veil-bootstrap/allow-empty-seeds` is required:
        # `cargo bench` builds в release-profile со снятым `cfg(test)`,
        # which trips the `compile_error!` gate в veil-bootstrap's
        # seed-list (asserts that release builds set EITHER
        # `production-seeds` для real seeds OR `allow-empty-seeds`
        # для testnet / CI use).  Without this feature CI fires the
        # gate и every bench fails before reaching its harness.
        run: |
          cargo bench -p veilcore --features veil-bootstrap/allow-empty-seeds --bench dht_lookup            -- --sample-size 10
          cargo bench -p veilcore --features veil-bootstrap/allow-empty-seeds --bench voice_stream          -- --sample-size 10
          cargo bench -p veilcore --features veil-bootstrap/allow-empty-seeds --bench socks5_throughput     -- --sample-size 10
          cargo bench -p veilcore --features veil-bootstrap/allow-empty-seeds --bench hybrid_kex            -- --sample-size 10
          cargo bench -p veilcore --features veil-bootstrap/allow-empty-seeds --bench adversary_validation  -- --sample-size 10

  devnet-smoke:
    name: Devnet smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build veil binary
        # `test-low-difficulty` drops PoW threshold от 24 → 16 bits, что
        # cuts per-node `config init` от minutes → seconds на debug-mode
        # ubuntu-latest (audit 2026-05-27 phase Q.4: CI runs were
        # taking >1h, mostly PoW search в debug mode).
        # `allow-empty-seeds` matches the bench jobs' build flags, so
        # the cache key restored от `test` (which builds с test-low-
        # difficulty for the test suite) is more likely к share artifacts.
        run: cargo build -p veil-cli --features test-low-difficulty,allow-empty-seeds

      - name: Start devnet (3 nodes)
        env:
          # Match the relaxed PoW threshold baked into the binary above —
          # без this, the script's default `--difficulty 24` would still
          # spend minutes mining а nonce that the daemon would accept в
          # ~1 second at 16 bits.
          DEVNET_POW_DIFFICULTY: "16"
        run: |
          chmod +x scripts/devnet.sh
          scripts/devnet.sh start --nodes 3
          sleep 3  # Let nodes connect

      - name: Run smoke test
        run: scripts/devnet.sh smoke

      - name: Stop devnet
        if: always()
        run: scripts/devnet.sh stop
